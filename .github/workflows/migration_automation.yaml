name: V7 Migration Automation

on:
  workflow_dispatch:
    inputs:
      phase:
        description: 'Migration Phase to Execute (e.g., Phase 1: Security, Phase 2: Schema)'
        required: true
        default: 'syntax-check'
        type: choice
        options:
          - syntax-check
          - extract-metadata
          - convert-schema
          - validate-terraform
          - validate-semantics
  release:
    types: [published]

jobs:
  validate_and_execute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install fastapi uvicorn pydantic google-cloud-bigquery

      - name: Syntax Check - Ontology Proxy
        if: ${{ github.event.inputs.phase == 'syntax-check' || github.event_name == 'release' }}
        run: |
          python -m py_compile scripts/ontology_api_proxy.py

      - name: Execute Metadata Scraper (Dry Run)
        if: ${{ github.event.inputs.phase == 'extract-metadata' }}
        run: |
          # Dry run simulation against a pilot dataset
          python scripts/metadata_scraper_to_policy_tags.py \
            --dataset_id ri.foundry.main.dataset.pilot123 \
            --project_id prj-data-governance-pilot \
            --output ci_generated_policy_tags.tf
          cat ci_generated_policy_tags.tf

      - name: Execute Schema Converter (Dry Run)
        if: ${{ github.event.inputs.phase == 'convert-schema' }}
        run: |
          # The script mocks input, so we use a dummy path
          python scripts/schema_to_dataform_converter.py \
            --input dummy.json \
            --output_dir ci_dataform_out
          cat ci_dataform_out/*.sqlx

      - name: Terraform Compliance Validator
        if: ${{ github.event.inputs.phase == 'validate-terraform' || github.event_name == 'release' }}
        working-directory: ./terraform
        run: |
          # Enforce compliance rules and state lock validation
          terraform init -backend=false
          terraform validate

      - name: Semantic Integrity Gatekeeper
        if: ${{ github.event.inputs.phase == 'validate-semantics' || github.event_name == 'release' }}
        run: |
          # Block migrations if PySpark hashes do not match
          # This acts as the automated data fidelity gatekeeper
          python scripts/pyspark_hash_validator.py \
            --bq_table prj-data-gold.ontology.flight_telemetry \
            --primary_key flight_id \
            --expected_hash 8f4e3c1b2a9d8f7e6c5b4a3d2e1f0a9b
