# Step flow:
#   1. validate-ontology      → checks all YAML files are structurally valid
#   2. compile-spanner-ddl    → generates DDL from YAML
#   3. detect-schema-drift    → separates pending evolution from true drift
#   4. apply-schema-evolution → applies only safe additive DDL to Spanner

steps:
  - name: 'python:3.11-slim'
    id: 'validate-ontology'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        cd /workspace
        export PYTHONPATH=/workspace
        pip install -r requirements.txt -q
        echo "=== Step 1: Validating ontology YAMLs ==="
        python -m scripts.orchestrator --action validate --source ontology
        echo "✅ Ontology validation passed."

  - name: 'python:3.11-slim'
    id: 'compile-spanner-ddl'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        cd /workspace
        export PYTHONPATH=/workspace
        pip install -r requirements.txt -q
        echo "=== Step 2: Compiling Spanner DDL from YAML ==="
        python -m scripts.graph_compiler
        echo "✅ DDL compilation complete."

  - name: 'python:3.11-slim'
    id: 'detect-schema-drift'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        cd /workspace
        export PYTHONPATH=/workspace
        pip install -r requirements.txt -q
        echo "=== Step 3: Detecting schema drift ==="
        python -m scripts.drift_detector \
          --ontology_dir=ontology \
          --apply-mode=auto-additive \
          --project=migiration-demo \
          --instance=ontology-demo \
          --database=ontology-db
        echo "✅ Drift detection complete."

  - name: 'python:3.11-slim'
    id: 'apply-schema-evolution'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        cd /workspace
        export PYTHONPATH=/workspace
        pip install -r requirements.txt -q
        echo "=== Step 4: Applying additive schema evolution to Spanner ==="
        python -m scripts.drift_detector \
          --ontology_dir=ontology \
          --apply-mode=auto-additive \
          --apply \
          --project=migiration-demo \
          --instance=ontology-demo \
          --database=ontology-db
        echo "✅ Schema evolution applied to Spanner."

  - name: 'python:3.11-slim'
    id: 'run-dvt-validation'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        cd /workspace
        export PYTHONPATH=/workspace
        pip install -r requirements.txt -q
        echo "=== Step 5: Executing DVT Semantic validation (Dry-Run mode) ==="
        python -m scripts.dvt_validator \
          --ontology-dir=ontology \
          --project=migiration-demo \
          --spanner-instance=ontology-demo \
          --spanner-database=ontology-db \
          --dry-run
        echo "✅ DVT semantic validations passed."

options:
  logging: CLOUD_LOGGING_ONLY
