# Native Cloud Build configuration for the deployment/apply pipeline.
# Gated by manual approval in Cloud Build before execution.

steps:
  # 1. Validate Ontology
  - name: 'python:3.11-slim'
    id: 'validate-ontology'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        cd /workspace
        export PYTHONPATH=/workspace
        pip install -r requirements.txt
        python -m scripts.orchestrator --action validate --source ontology

  # 2. Compile Spanner DDL
  - name: 'python:3.11-slim'
    id: 'compile-spanner-ddl'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        cd /workspace
        export PYTHONPATH=/workspace
        pip install -r requirements.txt
        # Just compiling DDL conceptually as requested
        python -m scripts.graph_compiler

  # 3. Terraform Apply
  - name: 'hashicorp/terraform:1.9.8'
    id: 'terraform-apply'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd terraform/envs/dev
        terraform init
        terraform apply -auto-approve -var-file="terraform.tfvars" -input=false

  # 4. Build Dataflow Worker Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-dataflow-worker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/dataflow-workers/ontology-bulk-load:$COMMIT_SHA'
      - 'dataflow/ontology_bulk_load'

  # 5. Push Dataflow Worker Image (Commit SHA tag)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-dataflow-worker-sha'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/dataflow-workers/ontology-bulk-load:$COMMIT_SHA'

  # 6. Tag Dataflow Worker Image as latest
  - name: 'gcr.io/cloud-builders/docker'
    id: 'tag-dataflow-worker-latest'
    args:
      - 'tag'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/dataflow-workers/ontology-bulk-load:$COMMIT_SHA'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/dataflow-workers/ontology-bulk-load:latest'

  # 7. Push Dataflow Worker Image (Latest tag)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-dataflow-worker-latest'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/dataflow-workers/ontology-bulk-load:latest'

options:
  logging: CLOUD_LOGGING_ONLY
