apiVersion: logistics.ontology/v1
kind: RelationshipType
metadata:
  name: DriverAssignment
  domain: Logistics
  version: 1.0.0
  steward: logistics-ontology-team
  description: Links a driver to their assigned vehicle.
spec:
  table: driver
  primaryKey: [driver_id]
  sourceKey: driver_id
  targetKey: vehicle_id
  attributes:
    - name: driver_id
      type: STRING(64)
      required: true
    - name: vehicle_id
      type: STRING(64)
      required: false
    - name: certification_level
      type: STRING(64)
      required: false
    - name: status
      type: STRING(64)
      required: false
