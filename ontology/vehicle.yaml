objectType: Vehicle
description: "A logistics transport vehicle mapped to the network."
properties:
  vehicle_id:
    type: STRING
    isPrimary: true
  vehicle_type:
    type: STRING
  max_weight_capacity:
    type: INT64
rules:
  - ruleId: VEH-001
    description: "Vehicle weight capacity must be greater than zero."
    property: max_weight_capacity
    condition: "> 0"
