apiVersion: routing.ontology/v1
kind: PropertyGraph
metadata:
  name: EnterpriseAirOntology
  version: 1.2.0
  steward: network-planning-ontology-team
  description: Air ontology graph - routings, segments, operations, transit paths.
spec:
  graphName: air_routing_graph
  nodes:
    - objectType: NetworkRouting
      tableName: network_routing
      key: routing_id
      label: NetworkRouting
    - objectType: NetworkRoutingSegment
      tableName: network_routing_segment
      key: segment_id
      label: NetworkRoutingSegment
    - objectType: Operation
      tableName: operation
      key: operation_id
      label: Operation
    - objectType: TransitPath
      tableName: transit_path
      key: transit_path_id
      label: TransitPath
    - objectType: Vehicle
      tableName: vehicle
      key: vehicle_id
      label: Vehicle
    - objectType: Driver
      tableName: driver
      key: driver_id
      label: Driver
    - objectType: MaintenanceLog
      tableName: maintenance_log
      key: log_id
      label: MaintenanceLog
  edges:
    - label: HAS_SEGMENT
      tableName: network_routing_segment
      key: segment_id
      relationshipType: HAS_SEGMENT
      source: { nodeType: network_routing, key: routing_id, foreignKey: routing_id }
      target: { nodeType: network_routing_segment, key: segment_id, foreignKey: segment_id }
    - label: BELONGS_TO
      tableName: network_routing_segment
      key: segment_id
      relationshipType: BELONGS_TO
      source: { nodeType: network_routing_segment, key: segment_id, foreignKey: segment_id }
      target: { nodeType: network_routing, key: routing_id, foreignKey: routing_id }
    - label: ORIGINATES_AT
      tableName: network_routing_segment
      key: segment_id
      relationshipType: ORIGINATES_AT
      source: { nodeType: network_routing_segment, key: segment_id, foreignKey: segment_id }
      target: { nodeType: operation, key: operation_id, foreignKey: origin_operation_id }
    - label: TERMINATES_AT
      tableName: network_routing_segment
      key: segment_id
      relationshipType: TERMINATES_AT
      source: { nodeType: network_routing_segment, key: segment_id, foreignKey: segment_id }
      target: { nodeType: operation, key: operation_id, foreignKey: destination_operation_id }
    - label: SATISFIES
      tableName: transit_path
      key: transit_path_id
      relationshipType: SATISFIES
      source: { nodeType: transit_path, key: transit_path_id, foreignKey: transit_path_id }
      target: { nodeType: network_routing_segment, key: segment_id, foreignKey: segment_id }
    - label: DRIVES
      tableName: driver
      key: driver_id
      relationshipType: DRIVES
      source: { nodeType: driver, key: driver_id, foreignKey: driver_id }
      target: { nodeType: vehicle, key: vehicle_id, foreignKey: vehicle_id }
    - label: HAS_MAINTENANCE
      tableName: maintenance_log
      key: log_id
      relationshipType: HAS_MAINTENANCE
      source: { nodeType: vehicle, key: vehicle_id, foreignKey: vehicle_id }
      target: { nodeType: maintenance_log, key: log_id, foreignKey: vehicle_id }
