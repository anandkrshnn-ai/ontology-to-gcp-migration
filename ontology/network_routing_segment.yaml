apiVersion: routing.ontology/v1
kind: RelationshipType
spec:
  table: network_routing_segment
  primaryKey: [segment_id]
  sourceKey: origin_operation_id
  targetKey: destination_operation_id
  attributes:
    - name: segment_id
      type: STRING(64)
      required: true
    - name: routing_id
      type: STRING(64)
      required: true
    - name: origin_operation_id
      type: STRING(64)
      required: true
    - name: destination_operation_id
      type: STRING(64)
      required: true
    - name: transport_mode
      type: STRING(16)
      enum: [AIR, SURFACE]
    - name: weight
      type: NUMERIC
    - name: pieces
      type: INT64
    - name: zulu_day
      type: DATE
      required: true
  relationships:
    - name: belongs_to_routing
      edge: BELONGS_TO
      target: NetworkRouting
      cardinality: many_to_one
      via: { localKey: routing_id, targetKey: routing_id }
      required: true
    - name: origin
      edge: ORIGINATES_AT
      target: Operation
      cardinality: many_to_one
      via: { localKey: origin_operation_id, targetKey: operation_id }
      required: true
    - name: destination
      edge: TERMINATES_AT
      target: Operation
      cardinality: many_to_one
      via: { localKey: destination_operation_id, targetKey: operation_id }
      required: true
    - name: satisfied_by
      edge: SATISFIED_BY
      target: TransitPath
      cardinality: one_to_many
  rules:
    - id: NRS-001
      expression: origin_operation_id != destination_operation_id
      severity: reject
    - id: NRS-002
      expression: routing_id IS NOT NULL
      severity: reject
