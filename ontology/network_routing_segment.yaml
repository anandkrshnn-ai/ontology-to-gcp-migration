apiVersion: logistics.ontology/v1
kind: RelationshipType
metadata:
  name: NetworkRoutingSegment
  domain: Logistics
  version: 1.0.0
  steward: logistics-ontology-team
  description: A segment linking two operations in a network routing path.
spec:
  table: network_routing_segment
  primaryKey: [segment_id]
  sourceKey: origin_operation_id
  targetKey: destination_operation_id
  sourceType: operation
  targetType: operation
  attributes:
    - name: segment_id
      type: STRING(64)
      required: true
    - name: routing_id
      type: STRING(64)
      required: false
    - name: origin_operation_id
      type: STRING(64)
      required: false
    - name: destination_operation_id
      type: STRING(64)
      required: false
    - name: transport_mode
      type: STRING(16)
      required: false
    - name: weight
      type: NUMERIC
      required: false
    - name: pieces
      type: INT64
      required: false
    - name: zulu_day
      type: DATE
      required: false
