apiVersion: routing.ontology/v1
kind: ObjectType
metadata:
  name: Waypoint
  domain: Ground
  version: 1.0.0
  steward: route-graph-ontology-team
  description: Stores waypoint/leg checkpoints for a route.
spec:
  table: waypoint
  primaryKey: [waypoint_id]
  attributes:
    - name: waypoint_id
      type: STRING(100)
      required: true
    - name: route_id_txt
      type: STRING(100)
      required: true
    - name: leg_no
      type: STRING(100)
      required: true
    - name: sequence_no
      type: STRING(100)
      required: true
    - name: location_cd
      type: STRING(100)
      required: true
    - name: operation
      type: STRING(100)
      required: false
    - name: begin_ts
      type: STRING(100)
      required: false
    - name: week_day
      type: STRING(100)
      required: false
    - name: days_offset
      type: STRING(100)
      required: false
    - name: handling_unit
      type: STRING(100)
      required: false
    - name: transit_id
      type: STRING(100)
      required: true
  relationships:
    - name: belongs_to_route
      edge: BELONGS_TO
      target: Route
      cardinality: many_to_one
      via: { localKey: route_id_txt, targetKey: route_id_txt }
    - name: at_location
      edge: AT_LOCATION
      target: Location
      cardinality: many_to_one
      via: { localKey: location_cd, targetKey: location_cd }
    - name: part_of_transit
      edge: PART_OF_TRANSIT
      target: TransitConnection
      cardinality: many_to_one
      via: { localKey: transit_id, targetKey: transit_id }
  rules:
    - id: WP-001
      field: sequence_no
      description: sequence_no must not be empty.
      expression: "sequence_no IS NOT NULL AND sequence_no != ''"
      severity: reject
    - id: WP-002
      field: week_day
      description: week_day must be a valid day abbreviation if provided.
      expression: "week_day IS NULL OR week_day IN ('MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT', 'SUN')"
      severity: warn
    - id: WP-003
      field: days_offset
      description: days_offset must be numeric string if provided.
      expression: "days_offset IS NULL OR REGEXP_CONTAINS(days_offset, r'^-?[0-9]+$')"
      severity: warn
