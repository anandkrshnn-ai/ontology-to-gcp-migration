apiVersion: logistics.ontology/v1
kind: ObjectType
metadata:
  name: Shipment
  domain: Logistics
  version: 1.0.0
  steward: logistics-ontology-team
  description: A shipment of goods moving through the logistics network.
spec:
  table: shipment
  primaryKey: [shipment_id]
  attributes:
    - name: shipment_id
      type: STRING(64)
      required: true
    - name: origin_warehouse_id
      type: STRING(64)
      required: true
    - name: destination_warehouse_id
      type: STRING(64)
      required: true
    - name: status
      type: STRING(32)
      required: false
    - name: total_weight_kg
      type: FLOAT64
      required: false
    - name: scheduled_departure
      type: TIMESTAMP
      required: false
    - name: actual_arrival
      type: TIMESTAMP
      required: false
  rules:
    - id: SHP-001
      description: Origin and destination must be different.
      expression: origin_warehouse_id != destination_warehouse_id
      severity: reject
