apiVersion: logistics.ontology/v1
kind: ObjectType
metadata:
  name: CargoTerminal
  domain: Logistics
  version: 1.0.0
  steward: logistics-ontology-team
  description: A cargo terminal node in the air logistics network where freight is consolidated and dispatched.
spec:
  table: cargo_terminal
  primaryKey: [terminal_id]
  attributes:
    - name: terminal_id
      type: STRING(64)
      required: true
    - name: terminal_name
      type: STRING(256)
      required: true
    - name: location_code
      type: STRING(16)
      required: true
    - name: handling_capacity_tons
      type: INT64
      required: false
    - name: is_hub_terminal
      type: BOOL
      required: false
  rules:
    - id: CGT-001
      description: Terminal ID must follow IATA format (3-letter code + suffix).
      expression: "REGEXP_CONTAINS(terminal_id, r'^[A-Z]{3}-[A-Z0-9]+$')"
      severity: reject
    - id: CGT-002
      description: Handling capacity must be positive if specified.
      expression: handling_capacity_tons > 0
      severity: warn
