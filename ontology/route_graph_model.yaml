apiVersion: routing.ontology/v1
kind: ObjectType
metadata:
  name: Route
  domain: Ground
  version: 1.0.0
  steward: route-graph-ontology-team
  description: Stores the overall route definition.
spec:
  table: route
  primaryKey: [route_id_txt]
  attributes:
    - name: route_id_txt
      type: STRING(100)
      required: true
    - name: source_cd
      type: STRING(100)
      required: false
    - name: valid_routing_path
      type: STRING(MAX)
      required: false
    - name: ursa_prefix_cd
      type: STRING(100)
      required: false
  relationships:
    - name: has_transit_connections
      edge: HAS_TRANSIT
      target: TransitConnection
      cardinality: one_to_many
      via: { localKey: route_id_txt, targetKey: route_id_txt }
    - name: has_waypoints
      edge: HAS_WAYPOINT
      target: Waypoint
      cardinality: one_to_many
      via: { localKey: route_id_txt, targetKey: route_id_txt }
  rules:
    - id: RT-001
      description: route_id_txt must not be empty.
      expression: route_id_txt IS NOT NULL AND route_id_txt != ''
      severity: reject
    - id: RT-002
      description: source_cd must not exceed max length if provided.
      expression: source_cd IS NULL OR LENGTH(source_cd) <= 100
      severity: warn
---
apiVersion: routing.ontology/v1
kind: ObjectType
metadata:
  name: Location
  domain: Ground
  version: 1.0.0
  steward: route-graph-ontology-team
  description: Stores physical facilities and locations.
spec:
  table: location
  primaryKey: [location_cd]
  attributes:
    - name: location_cd
      type: STRING(100)
      required: true
    - name: owner
      type: STRING(100)
      required: false
    - name: country
      type: STRING(100)
      required: false
    - name: source
      type: STRING(100)
      required: false
  rules:
    - id: LOC-001
      description: location_cd must not be empty.
      expression: location_cd IS NOT NULL AND location_cd != ''
      severity: reject
    - id: LOC-002
      description: country code must not exceed 3 chars if provided.
      expression: country IS NULL OR LENGTH(country) <= 3
      severity: warn
---
apiVersion: routing.ontology/v1
kind: ObjectType
metadata:
  name: TransitConnection
  domain: Ground
  version: 1.0.0
  steward: route-graph-ontology-team
  description: Stores transport movement for each leg.
spec:
  table: transit_connection
  primaryKey: [transit_id]
  attributes:
    - name: transit_id
      type: STRING(100)
      required: true
    - name: route_id_txt
      type: STRING(100)
      required: true
    - name: leg_no
      type: STRING(100)
      required: true
    - name: mode
      type: STRING(100)
      required: false
    - name: carrier
      type: STRING(100)
      required: false
    - name: depart_ts
      type: STRING(100)
      required: false
    - name: depart_operation
      type: STRING(100)
      required: false
    - name: arrive_ts
      type: STRING(100)
      required: false
    - name: arrive_operation
      type: STRING(100)
      required: false
    - name: depart_location_cd
      type: STRING(100)
      required: true
    - name: arrive_location_cd
      type: STRING(100)
      required: true
  relationships:
    - name: belongs_to_route
      edge: BELONGS_TO
      target: Route
      cardinality: many_to_one
      via: { localKey: route_id_txt, targetKey: route_id_txt }
    - name: departs_from
      edge: DEPARTS_FROM
      target: Location
      cardinality: many_to_one
      via: { localKey: depart_location_cd, targetKey: location_cd }
    - name: arrives_at
      edge: ARRIVES_AT
      target: Location
      cardinality: many_to_one
      via: { localKey: arrive_location_cd, targetKey: location_cd }
  rules:
    - id: TC-001
      description: Depart and arrive locations must differ.
      expression: depart_location_cd != arrive_location_cd
      severity: reject
    - id: TC-002
      description: mode must be a known transport mode if provided.
      expression: mode IS NULL OR mode IN (AIR, GROUND, SEA, RAIL)
      severity: warn
    - id: TC-003
      description: leg_no must not be empty.
      expression: leg_no IS NOT NULL AND leg_no != ''
      severity: reject
---
apiVersion: routing.ontology/v1
kind: ObjectType
metadata:
  name: Waypoint
  domain: Ground
  version: 1.0.0
  steward: route-graph-ontology-team
  description: Stores waypoint/leg checkpoints for a route.
spec:
  table: waypoint
  primaryKey: [waypoint_id]
  attributes:
    - name: waypoint_id
      type: STRING(100)
      required: true
    - name: route_id_txt
      type: STRING(100)
      required: true
    - name: leg_no
      type: STRING(100)
      required: true
    - name: sequence_no
      type: STRING(100)
      required: true
    - name: location_cd
      type: STRING(100)
      required: true
    - name: operation
      type: STRING(100)
      required: false
    - name: begin_ts
      type: STRING(100)
      required: false
    - name: week_day
      type: STRING(100)
      required: false
    - name: days_offset
      type: STRING(100)
      required: false
    - name: handling_unit
      type: STRING(100)
      required: false
    - name: transit_id
      type: STRING(100)
      required: true
  relationships:
    - name: belongs_to_route
      edge: BELONGS_TO
      target: Route
      cardinality: many_to_one
      via: { localKey: route_id_txt, targetKey: route_id_txt }
    - name: at_location
      edge: AT_LOCATION
      target: Location
      cardinality: many_to_one
      via: { localKey: location_cd, targetKey: location_cd }
    - name: part_of_transit
      edge: PART_OF_TRANSIT
      target: TransitConnection
      cardinality: many_to_one
      via: { localKey: transit_id, targetKey: transit_id }
  rules:
    - id: WP-001
      description: sequence_no must not be empty.
      expression: sequence_no IS NOT NULL AND sequence_no != ''
      severity: reject
    - id: WP-002
      description: week_day must be a valid day abbreviation if provided.
      expression: week_day IS NULL OR week_day IN (MON, TUE, WED, THU, FRI, SAT, SUN)
      severity: warn
    - id: WP-003
      description: days_offset must be numeric string if provided.
      expression: days_offset IS NULL OR REGEXP_CONTAINS(days_offset, r'^-?[0-9]+$')
      severity: warn
