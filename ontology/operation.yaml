apiVersion: routing.ontology/v1
kind: ObjectType
metadata:
  name: Operation
  domain: Air
  version: 1.0.0
  steward: network-planning-ontology-team
  description: An operational facility a segment originates at or terminates at.
spec:
  table: operation
  primaryKey: [operation_id]
  attributes:
    - name: operation_id
      type: STRING(64)
      required: true
    - name: operation_type
      type: STRING(16)
      enum: [STATION, RAMP, HUB, GATEWAY]
    - name: location_code
      type: STRING(16)
  relationships: []
  rules:
    - id: OP-001
      expression: "operation_type IN ('STATION','RAMP','HUB','GATEWAY')"
      severity: warn
