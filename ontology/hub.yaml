apiVersion: logistics.ontology/v1
kind: ObjectType
metadata:
  name: Hub
  domain: Logistics
  version: 1.0.0
  steward: logistics-ontology-team
  description: A central logistics hub node in the air freight network.
spec:
  table: hub
  primaryKey: [hub_id]
  attributes:
    - name: hub_id
      type: STRING(64)
      required: true
    - name: hub_name
      type: STRING(256)
      required: true
    - name: region
      type: STRING(64)
      required: false
    - name: max_throughput_tons
      type: INT64
      required: false
