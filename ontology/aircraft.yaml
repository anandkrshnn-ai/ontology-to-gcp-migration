apiVersion: logistics.ontology/v1
kind: ObjectType
metadata:
  name: Aircraft
  domain: Logistics
  version: 1.0.0
  steward: logistics-ontology-team
  description: An aircraft used for air cargo operations.
spec:
  table: aircraft
  primaryKey: [aircraft_id]
  attributes:
    - name: aircraft_id
      type: STRING(64)
      required: true
    - name: registration
      type: STRING(32)
      required: true
    - name: model
      type: STRING(64)
      required: false
    - name: capacity_tons
      type: INT64
      required: false
