# Native Cloud Build configuration for the validation/plan pipeline.
# Triggered on Pull Requests to validate Terraform configurations and Ontology specifications.

steps:
  # 1. Run Python unit tests for the orchestrator/compiler logic
  - name: 'python:3.11-slim'
    id: 'run-python-tests'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r requirements.txt
        PYTHONPATH=/workspace pytest scripts/tests/ -v

  # 2. Run the orchestrator validation command on incoming YAML definitions
  - name: 'python:3.11-slim'
    id: 'validate-ontology-yaml'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        cd /workspace
        export PYTHONPATH=/workspace
        pip install -r requirements.txt
        python -m scripts.orchestrator --action validate --source ontology

  # 3. Initialize Terraform
  - name: 'hashicorp/terraform:1.9.8'
    id: 'terraform-init'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd terraform/envs/dev
        terraform init

  # 4. Validate Terraform
  - name: 'hashicorp/terraform:1.9.8'
    id: 'terraform-validate'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd terraform/envs/dev
        terraform validate

  # 5. Run Terraform Plan (Dry-run configuration)
  - name: 'hashicorp/terraform:1.9.8'
    id: 'terraform-plan'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd terraform/envs/dev
        terraform plan -var-file="terraform.tfvars" -input=false

  # 6. Schema Drift Check (fails build if DB has out-of-band changes)
  - name: 'python:3.11-slim'
    id: 'drift-check'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r requirements.txt
        python scripts/drift_detector.py --ontology_dir=ontology --instance=ontology-demo --database=ontology-db

options:
  logging: CLOUD_LOGGING_ONLY
