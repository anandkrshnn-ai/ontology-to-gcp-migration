# Step flow:
#   1. run-python-tests       → unit tests
#   2. validate-ontology-yaml → structural YAML validation  
#   3. detect-changed-files   → incremental diff
#   4. drift-check            → ontology vs live Spanner

steps:
  - name: 'python:3.11-slim'
    id: 'run-python-tests'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        cd /workspace
        export PYTHONPATH=/workspace
        pip install -r requirements.txt
        pytest scripts/tests/ -v

  - name: 'python:3.11-slim'
    id: 'validate-ontology-yaml'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        cd /workspace
        export PYTHONPATH=/workspace
        pip install -r requirements.txt
        python -m scripts.orchestrator --action validate --source ontology

  - id: 'detect-changed-files'
    name: 'gcr.io/cloud-builders/git'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        git diff --name-only HEAD~1 HEAD -- ontology/ \
          | grep '\.yaml$' > /workspace/changed_files.txt || true
        echo "Changed ontology files:"
        cat /workspace/changed_files.txt

  - id: 'drift-check'
    name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        cd /workspace
        export PYTHONPATH=/workspace
        pip install -r requirements.txt
        python -m scripts.drift_detector \
          --ontology_dir=ontology \
          --project=migiration-demo \
          --instance=ontology-demo \
          --database=ontology-db \
          --changed-files=/workspace/changed_files.txt

options:
  logging: CLOUD_LOGGING_ONLY
